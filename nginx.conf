events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80 default_server;
        server_name _;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_set_header Accept-Encoding "";

        # Root redirect
        location = / { return 301 $scheme://$host/jellyseerr/; }
        
        # Catch-all for stray Jellyseerr root requests (fixing mobile/direct 404s)
        location = /login { return 301 $scheme://$host/jellyseerr/login; }

        # Sonarr
        location /sonarr/ { 
            proxy_pass http://sonarr:8989; 
        }
        location /sonarr { return 301 $scheme://$host/sonarr/; }

        # Radarr
        location /radarr/ { 
            proxy_pass http://radarr:7878; 
        }
        location /radarr { return 301 $scheme://$host/radarr/; }

        # Prowlarr
        location /prowlarr/ { 
            proxy_pass http://prowlarr:9696; 
        }
        location /prowlarr { return 301 $scheme://$host/prowlarr/; }

        # Jellyseerr (Fixed for Mobile/WebSockets)
        location /jellyseerr/ {
            proxy_pass http://jellyseerr:5055/;
            proxy_set_header X-Forwarded-Prefix /jellyseerr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_redirect / /jellyseerr/;
            proxy_set_header X-Forwarded-Host $host;
        }
        location /jellyseerr { return 301 $scheme://$host/jellyseerr/; }

        # Jellyseerr assets and API mapping (Consolidated and fixed)
        location ~ ^/(_next|api/v1|images|logo.*\.svg|favicon\.ico|site\.webmanifest|apple-touch-icon.*\.png|logo.*\.png) {
            proxy_pass http://jellyseerr:5055;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Forwarded-Host $host;
        }

        # Jellyfin
        location /jellyfin/ {
            proxy_pass http://jellyfin:8096;
            proxy_set_header X-Forwarded-Protocol $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location /jellyfin { return 301 $scheme://$host/jellyfin/; }

        # qBittorrent
        location /qbittorrent/ { 
            proxy_pass http://qbittorrent:5080/; 
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header Referer "";
            proxy_set_header Origin "";
        }
        location /qbittorrent { return 301 $scheme://$host/qbittorrent/; }

        # IPTV Proxy
        location /iptv/ {
            proxy_pass http://iptv-proxy:8081/;
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            chunked_transfer_encoding off;
            proxy_read_timeout 600s;
        }
    }
}
