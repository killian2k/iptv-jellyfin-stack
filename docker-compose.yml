name: media-stack
networks:
  mynetwork:
    external: true
services:
  flaresolverr:
    container_name: flaresolverr
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=UTC
    image: ghcr.io/flaresolverr/flaresolverr:latest
    networks:
    - mynetwork
    ports:
    - 8191:8191
    restart: unless-stopped
    volumes:
    - flaresolverr-config:/config
    - torrent-downloads:/downloads
  iptv-proxy:
    build: ../iptv-proxy
    container_name: iptv-proxy
    networks:
    - mynetwork
    ports:
    - 8081:8081
    profiles:
    - vpn
    - no-vpn
    restart: unless-stopped
    volumes:
    - ../iptv-proxy/iptv_proxy.py:/app/iptv_proxy.py
  jellyfin:
    container_name: jellyfin
    devices:
    - /dev/dri:/dev/dri
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=UTC
    - DOCKER_MODS=linuxserver/mods:jellyfin-opencl-intel
    image: lscr.io/linuxserver/jellyfin:latest
    networks:
    - mynetwork
    ports:
    - 8096:8096
    - 7359:7359/udp
    - 8920:8920
    profiles:
    - vpn
    - no-vpn
    restart: unless-stopped
    volumes:
    - jellyfin-config:/config
    - torrent-downloads:/data
    - torrent-downloaded:/downloaded
  jellyseerr:
    container_name: jellyseerr
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=UTC
    image: ghcr.io/seerr-team/seerr:latest
    networks:
    - mynetwork
    ports:
    - 5055:5055
    profiles:
    - vpn
    - no-vpn
    restart: unless-stopped
    volumes:
    - jellyseerr-config:/app/config
  nginx:
    container_name: nginx
    depends_on:
    - radarr
    - sonarr
    - prowlarr
    - jellyseerr
    - jellyfin
    - qbittorrent
    - iptv-proxy
    image: nginx:latest
    networks:
    - mynetwork
    ports:
    - 80:80
    profiles:
    - vpn
    - no-vpn
    restart: unless-stopped
    volumes:
    - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  prowlarr:
    container_name: prowlarr
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=UTC
    image: lscr.io/linuxserver/prowlarr:latest
    networks:
    - mynetwork
    ports:
    - 9696:9696
    profiles:
    - vpn
    - no-vpn
    restart: unless-stopped
    volumes:
    - prowlarr-config:/config
  qbittorrent:
    container_name: qbittorrent
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=UTC
    - WEBUI_PORT=5080
    image: lscr.io/linuxserver/qbittorrent:latest
    networks:
    - mynetwork
    ports:
    - 5080:5080
    - 6881:6881
    - 6881:6881/udp
    profiles:
    - vpn
    - no-vpn
    restart: unless-stopped
    volumes:
    - qbittorrent-config:/config
    - torrent-downloads:/downloads
    - torrent-downloaded:/downloaded
  radarr:
    container_name: radarr
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=UTC
    image: lscr.io/linuxserver/radarr:latest
    networks:
    - mynetwork
    ports:
    - 7878:7878
    profiles:
    - vpn
    - no-vpn
    restart: unless-stopped
    volumes:
    - radarr-config:/config
    - torrent-downloads:/downloads
    - torrent-downloaded:/downloaded
  sonarr:
    container_name: sonarr
    environment:
    - PUID=1000
    - PGID=1000
    - TZ=UTC
    image: lscr.io/linuxserver/sonarr:latest
    networks:
    - mynetwork
    ports:
    - 8989:8989
    profiles:
    - vpn
    - no-vpn
    restart: unless-stopped
    volumes:
    - sonarr-config:/config
    - torrent-downloads:/downloads
    - torrent-downloaded:/downloaded
  vpn:
    cap_add:
    - NET_ADMIN
    container_name: vpn
    devices:
    - /dev/net/tun:/dev/net/tun
    environment:
    - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER:-nordvpn}
    - OPENVPN_USER=${OPENVPN_USER:-""}
    - OPENVPN_PASSWORD=${OPENVPN_PASSWORD:-""}
    - SERVER_COUNTRIES=${SERVER_COUNTRIES:-Switzerland}
    image: qmcgaw/gluetun:latest
    networks:
    - mynetwork
    profiles:
    - vpn
    restart: unless-stopped
volumes:
  flaresolverr-config: null
  jellyfin-config: null
  jellyseerr-config: null
  prowlarr-config: null
  qbittorrent-config: null
  radarr-config: null
  sonarr-config: null
  torrent-downloaded:
    driver: local
    driver_opts:
      device: /mnt/nvme/Media
      o: bind
      type: none
  torrent-downloads:
    driver: local
    driver_opts:
      device: /mnt/nvme/MediaLibrary
      o: bind
      type: none
